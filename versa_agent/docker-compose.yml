version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: versaagent-db
    environment:
      POSTGRES_USER: versaagent
      POSTGRES_PASSWORD: versaagent
      POSTGRES_DB: versaagent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U versaagent"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: versaagent-backend
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://versaagent:versaagent@postgres:5432/versaagent?schema=public
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm start

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: versaagent-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host

volumes:
  postgres_data:
